{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header">
                <h3 class="mb-0">Login to MonRix</h3>
            </div>

            <div class="card-body">

                {% if form.errors %}
                <div class="alert alert-danger">
                    Invalid username or password.
                </div>
                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Password
                        </label>
                        {{ form.password }}
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

                <hr>

                <p>
                    Don't have an account?
                    <a href="/register/">
                        Register here
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
